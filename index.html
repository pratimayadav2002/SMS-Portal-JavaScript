<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SMS Portal</title>

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container-fluid">
      <div class="navbar-custom mb-4 text-center">
        <a href="#">📩 SMS Portal</a>
        <a href="add_library.html">Add Library</a>
        <a href="add_group.html">Add Group</a>
        <a href="add_message.html">Add Message</a>
        <a href="add_contact.html">Add Contact</a>
        <a href="index.html" id="home">Home Page</a>
      </div>

      <div class="row g-4">
        <!-- Left -->
        <div class="col-lg-3">
          <div class="glass-card float-card mb-4">
            <h3 class="section-title">📚 All Library</h3>
            <ul id="ul1"></ul>
          </div>

          <div class="glass-card">
            <h3 class="section-title">💬 All Messages</h3>
            <ul id="all_message"></ul>
          </div>
        </div>

        <!-- Center -->

        <div class="col-lg-6">
          <div class="glass-card">
            <h2 class="section-title mb-4">✨ Send Message</h2>

            <form>
              <div class="mb-3">
                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter Name"
                  id="formUserName"
                />
              </div>

              <div class="mb-3">
                <input
                  type="text"
                  class="form-control"
                  placeholder="Mobile Number"
                  id="formUserMobile"
                />
              </div>

              <div class="mb-3">
                <input
                  type="email"
                  class="form-control"
                  placeholder="Email Address"
                  id="formUserEmail"
                />
              </div>

              <div class="mb-3">
                <textarea
                  class="form-control"
                  rows="4"
                  placeholder="Enter your message"
                  id="formMessage"
                ></textarea>
              </div>

              <div class="text-center">
                <button class="neon-btn">🚀 Submit</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Right -->

        <div class="col-lg-3">
          <div class="glass-card float-card mb-4">
            <h3 class="section-title">👥 All Groups</h3>
            <ul id="ul2"></ul>
          </div>

          <div class="glass-card">
            <h3 class="section-title">📱 All Contacts</h3>
            <ul id="all_contact"></ul>
          </div>
        </div>
      </div>
    </div>

    <script src="library/functions.js" type="module"></script>

    <script type="module">
      import { getValue, fetchDataUl } from "./library/functions.js";
      // console.log(getValue('libName'));

      fetchDataUl(getValue("libName"), "#ul1", "getMessage");
      fetchDataUl(getValue("groupName"), "#ul2", "getContact");
    </script>
  </body>
</html>
