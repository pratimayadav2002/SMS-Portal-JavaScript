<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Add Library</title>

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="navbar-custom">
      <a href="#">📩 SMS Portal</a>
      <a href="add_library.html">Add Library</a>
      <a href="add_group.html">Add Group</a>
      <a href="add_message.html">Add Message</a>
      <a href="add_contact.html">Add Contact</a>
      <a href="index.html" id="home">Home Page</a>
    </div>

    <div class="glass-card">
      <h2 class="title">📱 Add Contact</h2>

      <div class="mb-4">
        <select id="groupInfo" class="form-control">
          <option value="">Please Select Group</option>
        </select>
      </div>

      <div class="mb-4">
        <input
          type="text"
          id="txt1"
          class="form-control"
          placeholder="Enter Name"
        />
      </div>

      <div class="mb-4">
        <input
          type="text"
          id="txt2"
          class="form-control"
          placeholder="Enter Mobile"
        />
      </div>

      <div class="mb-4">
        <input
          type="email"
          id="txt3"
          class="form-control"
          placeholder="Enter Email"
        />
      </div>

      <div class="text-center">
        <button id="btn" class="neon-btn">➕ Add Group</button>
      </div>

      <p id="message"></p>
    </div>

    <script src="library/functions.js" type="module"></script>
    <script type="module">
      import {
        fetchDataOption,
        element,
        elements,
        set,
        get,
        getValue,
        setValue,
        parse,
        stringify,
        empty,
        setMessage,
        lower,
        fetchDataUl,
      } from "./library/functions.js";

      fetchDataOption(getValue("groupName"), "#groupInfo");

      element("#btn").onclick = function () {
        let textValue1 = lower(get("#txt1"));
        let textValue2 = lower(get("#txt2"));
        let textValue3 = lower(get("#txt3"));
        let groupInfo = lower(get("#groupInfo"));

        // console.log(txtValue);
        // console.log(empty[txtValue]);

        if (empty([textValue1, textValue2, textValue3, groupInfo])) {
          setMessage("#message", "Values Require");
        } else {
          let contactInfo = getValue("contactDetails");
          console.log(contactInfo);

          let infoObj = {
            name: textValue1,
            mobile: textValue2,
            email: textValue3,
            groupName: groupInfo,
          };

          if (contactInfo === null) {
            let arr = [];

            arr.push(infoObj);
            let result = stringify(arr);
            setValue("contactDetails", result);
            setMessage("#message", "Contact Values Added");
            set("#txt1", "");
            set("#txt2", "");
            set("#txt3", "");
            set("#groupInfo", "");
          } else {
            groupInfo = parse(contactInfo);
            groupInfo.push(infoObj);
            let result = stringify(groupInfo);
            console.log(result);

            setValue("contactDetails", result);
            setMessage("#message", "Contact Value Updated");
            set("#txt1", "");
            set("#txt2", "");
            set("#txt3", "");
            set("#groupInfo", "");
          }
        }
      };
    </script>
  </body>
</html>
