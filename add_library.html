<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Add Library</title>

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="navbar-custom">
      <a href="#">📩 SMS Portal</a>
      <a href="add_library.html">Add Library</a>
      <a href="add_group.html">Add Group</a>
      <a href="add_message.html">Add Message</a>
      <a href="add_contact.html">Add Contact</a>
      <a href="index.html" id="home">Home Page</a>
    </div>

    <div class="glass-card">
      <h2>📚 Add Library</h2>

      <div class="mb-4">
        <input
          type="text"
          id="txt"
          class="form-control"
          placeholder="Enter Library Name"
        />
      </div>

      <button id="btn" class="neon-btn">➕ Add Library</button>

      <p id="message"></p>
    </div>

    <script src="library/functions.js" type="module"></script>
    <script type="module">
      import {
        element,
        elements,
        set,
        get,
        getValue,
        setValue,
        parse,
        stringify,
        create,
        empty,
        setMessage,
        lower,
        fetchDataUl,
      } from "./library/functions.js";

      element("#btn").onclick = function () {
        let txtValue = lower(get("#txt"));

        // console.log(txtValue);
        // console.log(empty([txtValue]));

        if (empty([txtValue])) {
          setMessage("#message", "Library Name Require");
        } else {
          let libName = getValue("libName");
          if (libName === null) {
            let arr = stringify([txtValue]);
            // console.log(arr);
            setValue("libName", arr);
            setMessage("#message", "Library Name Added");
            set("#txt", "");
          } else {
            // console.log(libName);

            libName = parse(libName);
            // console.log(libName);

            // console.log(txtValue);
            if (!libName.includes(txtValue)) {
              libName.push(txtValue);
              let result = stringify(libName);
              setValue("libName", result);
              setMessage("#message", "Library Updated");
              set("#txt", "");
            } else {
              setMessage("#message", "Library Exist");
              set("#txt", "");
            }
          }
        }
      };
    </script>
  </body>
</html>
