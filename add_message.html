      import {

        setMessage,
        lower,
        fetchDataUl,
      } from "./library/functions.js";

      fetchDataOption(getValue("libName"), "#libraryInfo");

      element("#btn").onclick = function () {
        let textValue1 = lower(get("#txt1"));
        let textValue2 = lower(get("#libraryInfo"));

        // console.log(txtValue);
        // console.log(empty[txtValue]);

        if (empty([textValue1, libraryInfo])) {
          setMessage("#message", "Values Require");
        } else {
          let messageInfo = getValue("messageDetails");
          console.log(messageInfo);

          let infoObj = {
            content: textValue1,
            libName: textValue2,
          };

          if (messageInfo === null) {

            groupInfo.push(infoObj);

            console.log(result);

            setValue("messageDetails", result);
